<!-- ============================================================
   admin-layout.component.html — CORRIGÉ
   Ajouter le backdrop et initialiser la sidebar collapsed sur mobile
   ============================================================ -->

<div class="sb-nav-fixed admin-shell admin-layout" [class.sidebar-collapsed]="sidebarCollapsed()">

    <!-- ① Navbar admin -->
    <app-admin-navbar [sidebarCollapsed]="sidebarCollapsed()" (toggleSidebar)="toggleSidebar()">
    </app-admin-navbar>

    <div id="layoutSidenav">

        <!-- ② Sidebar admin -->
        <app-admin-sidebar [collapsed]="sidebarCollapsed()">
        </app-admin-sidebar>

        <!-- ③ BACKDROP MOBILE — ferme la sidebar en cliquant à côté -->
        <div class="sidebar-backdrop" (click)="toggleSidebar()"></div>

        <!-- ④ Contenu des pages admin -->
        <div id="layoutSidenav_content">
            <main>
                <router-outlet></router-outlet>
            </main>

            <footer class="admin-footer py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; BioSen100 {{ currentYear }}</div>
                        <div>
                            <a href="#">Politique de confidentialité</a>
                            &middot;
                            <a href="#">Conditions d'utilisation</a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>

    </div>
</div>


<!-- ============================================================
   admin-layout.component.ts — CORRIGÉ
   Initialiser la sidebar en mode "collapsed" sur mobile
   ============================================================

import { Component, signal, OnInit, HostListener } from '@angular/core';

@Component({
  selector: 'app-admin-layout',
  templateUrl: './admin-layout.component.html',
  styleUrls: ['./admin-layout.component.css']
})
export class AdminLayoutComponent implements OnInit {

  currentYear = new Date().getFullYear();

  // CRITIQUE : sur mobile la sidebar est cachée par défaut (collapsed = true)
  // Sur desktop elle est visible par défaut (collapsed = false)
  sidebarCollapsed = signal(window.innerWidth <= 992);

  ngOnInit(): void {}

  toggleSidebar(): void {
    this.sidebarCollapsed.set(!this.sidebarCollapsed());
  }

  // Gestion du redimensionnement de la fenêtre
  @HostListener('window:resize', ['$event'])
  onResize(event: Event): void {
    const width = (event.target as Window).innerWidth;
    if (width <= 992) {
      // Sur mobile : fermer la sidebar si on redimensionne
      this.sidebarCollapsed.set(true);
    } else {
      // Sur desktop : ouvrir la sidebar
      this.sidebarCollapsed.set(false);
    }
  }
}
-->
